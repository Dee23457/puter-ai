<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IDIOTBOX 1</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/impact');
        body { margin: 0; overflow: hidden; background: #1a001a; font-family: 'Impact', sans-serif; color: #ff00ff; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid #ff00ff; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; border-radius: 50%; }
        #scanner { position: absolute; top: 52%; left: 52%; font-size: 14px; color: #ff00ff; text-shadow: 2px 2px #000; pointer-events: none; }
        #ui-left { position: absolute; bottom: 30px; left: 30px; background: rgba(30, 0, 30, 0.9); padding: 20px; border-left: 5px solid #ff00ff; pointer-events: none; }
        #ui-right { position: absolute; bottom: 30px; right: 30px; text-align: right; background: rgba(30, 0, 30, 0.9); padding: 20px; border-right: 5px solid #ff00ff; pointer-events: none; }
        #net-status { position: absolute; top: 30px; left: 30px; font-size: 18px; color: #fff; background: rgba(255,0,255,0.2); padding: 10px; border: 1px solid #ff00ff; z-index: 100; }
        input { font-family: 'Impact'; background: #110011; border: 1px solid #ff00ff; color: #ff00ff; padding: 5px; outline: none; width: 150px; }
        #my-id { color: #0ff; cursor: pointer; text-decoration: underline; }
        .key { color: #000; background: #ff00ff; padding: 0 5px; margin-right: 5px; }
        .val { font-size: 24px; display: block; }
    </style>
</head>
<body>

<div id="net-status">
    MY ID: <span id="my-id" title="Click to copy">...</span>
    <input type="text" id="join-id" placeholder="CONNECT ID...">
</div>

<div id="crosshair"></div>
<div id="scanner">SENSORS ONLINE</div>

<div id="ui-left">
    <div><span class="key">R-CLICK</span> GRAB/DROP | <span class="key">L-CLICK</span> PUNT</div>
    <div><span class="key">G</span> FREEZE | <span class="key">F</span> LIGHT | <span class="key">SHIFT</span> RUN</div>
</div>

<div id="ui-right">
    <span class="val" id="pos-display">0, 0, 0</span>
    <div style="font-size: 11px; opacity: 0.6;">INPUT UNLOCKED</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "cannon": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js" } } </script>

<script type="module">
    import * as THREE from 'three';
    import * as CANNON from 'cannon';

    // --- SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a000a);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.rotation.order = 'YXZ';
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const listener = new THREE.AudioListener();
    camera.add(listener);

    function playSpatialSFX(mesh, freq, type, vol, dur) {
        if (listener.context.state === 'suspended') listener.context.resume();
        const sound = new THREE.PositionalAudio(listener);
        const osc = listener.context.createOscillator();
        const gain = listener.context.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, listener.context.currentTime);
        gain.gain.setValueAtTime(vol, listener.context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, listener.context.currentTime + dur);
        osc.connect(gain);
        sound.setNodeSource(gain);
        sound.setRefDistance(5);
        mesh.add(sound);
        osc.start();
        setTimeout(() => { osc.stop(); mesh.remove(sound); }, dur * 1000);
    }

    // --- PHYSICS ---
    const world = new CANNON.World();
    world.gravity.set(0, -25, 0);

    scene.add(new THREE.AmbientLight(0xff00ff, 0.2));
    const pLight = new THREE.PointLight(0xff00ff, 25, 12); scene.add(pLight);
    const flashLight = new THREE.SpotLight(0xffffff, 0, 80, Math.PI/6, 0.3);
    scene.add(flashLight); scene.add(flashLight.target);

    const gun = new THREE.Group();
    const gMain = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.4), new THREE.MeshStandardMaterial({color: 0x000000}));
    const gCore = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshStandardMaterial({color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 2}));
    gCore.position.z = -0.15; gun.add(gMain, gCore); scene.add(gun);

    // --- NETWORKING ---
    const peer = new Peer();
    let conns = [], objects = {};
    const myIdEl = document.getElementById('my-id');
    const joinInput = document.getElementById('join-id');

    peer.on('open', id => {
        myIdEl.innerText = id;
        myIdEl.onclick = () => {
            navigator.clipboard.writeText(id);
            const oldText = myIdEl.innerText;
            myIdEl.innerText = "COPIED!";
            setTimeout(() => myIdEl.innerText = oldText, 1000);
        };
    });

    peer.on('connection', c => {
        c.on('open', () => {
            conns.push(c);
            Object.keys(objects).forEach(id => c.send({ type: 'spawn', id, pos: objects[id].body.position, key: objects[id].key }));
        });
        c.on('data', d => {
            const o = objects[d.id];
            if (d.type === 'spawn' && !o) spawn(d.key, d.id, d.pos, true);
            if (d.type === 'sync' && o) { o.body.position.set(d.x, d.y, d.z); o.body.quaternion.set(d.qx, d.qy, d.qz, d.qw); }
            if (d.type === 'freeze' && o) { o.body.type = d.frozen ? CANNON.Body.STATIC : CANNON.Body.DYNAMIC; o.mesh.material.emissive.setHex(d.frozen ? 0x660066 : 0); }
        });
    });

    joinInput.onkeypress = e => { if(e.key === 'Enter') peer.connect(e.target.value); };

    // --- KIT ---
    const kit = {
        '1': {n:'WOOD PLANK', s:[3, 0.2, 1.2], c:0x8b4513},
        '2': {n:'CARGO CRATE', s:[2, 2, 2], c:0xcd853f},
        '3': {n:'STEEL BARREL', s:[1, 1.6], c:0x333333, cy:true},
        '4': {n:'SUPPORT COLUMN', s:[1, 8, 1], c:0x444444}
    };

    function spawn(key, id, pos, isRem = false) {
        const d = kit[key];
        const mesh = new THREE.Mesh(
            d.cy ? new THREE.CylinderGeometry(d.s[0]/2, d.s[0]/2, d.s[1], 16) : new THREE.BoxGeometry(...d.s),
            new THREE.MeshStandardMaterial({ color: d.c })
        );
        const body = new CANNON.Body({ mass: 15, shape: d.cy ? new CANNON.Cylinder(d.s[0]/2, d.s[0]/2, d.s[1], 16) : new CANNON.Box(new CANNON.Vec3(d.s[0]/2, d.s[1]/2, d.s[2]/2)) });
        body.position.copy(pos);
        body.angularDamping = 0.9;
        
        body.addEventListener('collide', (e) => {
            const vel = Math.abs(e.contact.getImpactVelocityAlongNormal());
            if (vel > 1.5) {
                const pitch = Math.max(55, 140 - (vel * 2));
                const volume = Math.min(0.4, vel / 35);
                playSpatialSFX(mesh, pitch, 'sine', volume, 0.2);
            }
        });

        scene.add(mesh); world.addBody(body);
        objects[id] = { mesh, body, name: d.n, key };
        if (!isRem) conns.forEach(c => c.send({ type: 'spawn', id, pos, key }));
        playSpatialSFX(mesh, 400, 'triangle', 0.1, 0.1);
    }

    scene.add(new THREE.GridHelper(500, 50, 0xff00ff, 0x220022));
    const floor = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
    floor.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI/2);
    world.addBody(floor);

    // --- CONTROLS ---
    let yaw = 0, pitch = 0, bob = 0, pY = 0, vVel = 0, grounded = true, stepTime = 0;
    let held = null, hId = null, rotOff = 0, flashOn = false;
    const keys = {};

    document.onmousemove = e => { 
        if(document.pointerLockElement){ 
            yaw -= e.movementX*0.002; 
            pitch -= e.movementY*0.002; 
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
        }
    };

    document.onmousedown = e => {
        if (document.activeElement === joinInput) return;
        if (!document.pointerLockElement) { document.body.requestPointerLock(); return; }
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(Object.values(objects).map(o => o.mesh));
        if (e.button === 2) {
            if (held) { held = null; }
            else if (hits.length > 0) {
                hId = Object.keys(objects).find(k => objects[k].mesh === hits[0].object);
                held = objects[hId].body; held.wakeUp(); rotOff = 0;
            }
        }
        if (e.button === 0 && held) {
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            held.velocity.set(dir.x*85, dir.y*85, dir.z*85); held = null;
        }
    };

    document.onkeydown = e => {
        if (document.activeElement === joinInput) return; // Prevent movement/spawning while typing
        if (e.code === 'Space' && grounded) { vVel = 14; grounded = false; }
        if (e.key === 'f') { flashOn = !flashOn; flashLight.intensity = flashOn ? 150 : 0; }
        if (kit[e.key]) spawn(e.key, "o_"+Date.now(), new THREE.Vector3(0,0,-5).applyQuaternion(camera.quaternion).add(camera.position));
        keys[e.code] = true;
    };
    document.onkeyup = e => keys[e.code] = false;

    function animate() {
        requestAnimationFrame(animate);
        world.fixedStep();

        if (document.activeElement !== joinInput) {
            const s = (keys.ShiftLeft ? 0.38 : 0.2);
            if (keys.KeyW||keys.KeyS||keys.KeyA||keys.KeyD) {
                const d = new THREE.Vector3();
                if(keys.KeyW) d.z-=s; if(keys.KeyS) d.z+=s; if(keys.KeyA) d.x-=s; if(keys.KeyD) d.x+=s;
                const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw);
                camera.position.add(d.applyQuaternion(q));
                if(grounded) { 
                    bob += s * 1.4; 
                    if (Date.now() - stepTime > (keys.ShiftLeft ? 250 : 400)) {
                        const osc = listener.context.createOscillator();
                        const g = listener.context.createGain();
                        osc.frequency.value = 55; g.gain.value = 0.05;
                        osc.connect(g); g.connect(listener.context.destination);
                        osc.start(); osc.stop(listener.context.currentTime + 0.1);
                        stepTime = Date.now();
                    }
                }
            }
        }
        
        pY += vVel * 0.016;
        if(pY > 0) { vVel -= 0.7; grounded = false; } 
        else { pY=0; vVel=0; grounded=true; }
        
        camera.rotation.set(pitch, yaw, 0);
        const vBob = Math.sin(bob) * 0.06;
        const hBob = Math.cos(bob * 0.5) * 0.03;
        camera.position.y = (camera.position.y * 0.7) + ((pY + 1.7 + vBob) * 0.3);

        gun.position.copy(camera.position);
        gun.rotation.copy(camera.rotation);
        gun.translateX(0.35 + hBob);
        gun.translateY(-0.35 + vBob * 0.5);
        gun.translateZ(-0.6);

        pLight.position.copy(camera.position);
        flashLight.position.copy(camera.position);
        flashLight.target.position.copy(camera.position).add(new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion));

        if (held) {
            const t = new THREE.Vector3(0,0,-5.5).applyQuaternion(camera.quaternion).add(camera.position);
            held.velocity.set((t.x-held.position.x)*25, (t.y-held.position.y)*25, (t.z-held.position.z)*25);
            const q = camera.quaternion.clone().multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), rotOff));
            held.quaternion.set(q.x,q.y,q.z,q.w); held.angularVelocity.set(0,0,0);
        }

        Object.values(objects).forEach(o => { o.mesh.position.copy(o.body.position); o.mesh.quaternion.copy(o.body.quaternion); });
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
